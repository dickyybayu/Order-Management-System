services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: oms-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${OMS_SQL_PASSWORD:?Set OMS_SQL_PASSWORD before starting SQL Server}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data:
